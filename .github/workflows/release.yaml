name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run tests

      - name: Build it
        run: bun run build

      - name: Create release notes
        run: sed -n "/^## /{ :loop; n; /^## /q; p; b loop; }" ./CHANGELOG.md | sed -z "s/^[[:space:]]*//; s/[[:space:]]*\$//" > ./RELEASE_NOTES.md

      - name: Set permissions on builds file
        run: chmod -R u+rwX ./builds

      - name: Update release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: ./RELEASE_NOTES.md
          files: ./builds/**
