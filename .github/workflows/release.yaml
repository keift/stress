name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run tests

      - name: Build it
        run: bun run build

      - name: Create release note
        run: sed -n "/^## /{p; :loop; n; /^## /q; p; b loop}" CHANGELOG.md > RELEASE_NOTE.md

      - name: Set permissions on builds file
        run: chmod -R u+rwX ./builds

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: ./RELEASE_NOTE.md
          files: ./builds/**
